services:
  - type: web
    name: resell-api
    runtime: node
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm --filter @resell/db exec prisma generate
    startCommand: pnpm --filter @resell/api exec tsx src/index.ts
    plan: free
    region: singapore
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: WEB_URL
        value: "https://resell-web.vercel.app"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: MSG91_AUTH_KEY
        value: ""
      - key: R2_ACCOUNT_ID
        value: ""
      - key: R2_ACCESS_KEY_ID
        value: ""
      - key: R2_SECRET_ACCESS_KEY
        value: ""
      - key: R2_BUCKET_NAME
        value: "resell-tickets"
      - key: R2_PUBLIC_URL
        value: ""
